      - SPRING_DATASOURCE_URL=jdbc:mysql://10.1.4.4:3306/hcp_ussd?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=dev_user
      - SPRING_DATASOURCE_PASSWORD=Foxcode@7
    ports:
