    restart: always
    networks:
      - hcp-web-network
    sysctls:
      - net.ipv4.tcp_keepalive_intvl=45
      - net.ipv4.tcp_keepalive_probes=15
      - net.ipv4.tcp_keepalive_time=295
    volumes:
      - hcp-web-core:/data/hcp-web-core-service

  life-web-service:
